<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faktur - Yuuki Cell Kasir</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>
  <div class="mobile-app">

    <header class="app-header">
      <div class="header-top">
        <a href="index.html" class="icon-btn back-btn">
          <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2" fill="none"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </a>
        <h1>Daftar Faktur</h1>
        <button id="themeToggle" class="icon-btn" aria-label="Toggle Dark Mode">
          <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>

      <div class="datetime-card">
        <div id="dateDisplay" class="date-text">Memuat...</div>
        <div id="timeDisplay" class="time-text">--:--:--</div>
      </div>
    </header>

    <main class="app-content">
      <button onclick="bukaModalFaktur()" class="menu-btn primary-btn" style="width: 100%; margin-bottom: 32px;">
        <svg class="icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"
          stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        Buat Faktur Baru
      </button>

      <section class="transaction-history" style="margin-top: 0;">
        <h3 class="section-title">Riwayat Faktur</h3>
        <div id="fakturList" class="transaction-list">
        </div>
      </section>
    </main>

    <div id="modalFaktur" class="modal-overlay">
      <div class="modal-card" style="max-height: 90vh; overflow-y: auto;">
        <h3 id="modalFakturTitle">Buat Faktur Baru</h3>
        <input type="hidden" id="fakId">

        <div class="form-grid">
          <div class="form-group">
            <label>Tanggal Transaksi</label>
            <input type="date" id="fakTanggal">
          </div>
          <div class="form-group">
            <label>Nama Pembeli (Opsional)</label>
            <input type="text" id="fakPembeli" placeholder="Umum">
          </div>
        </div>

        <label
          style="font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; display: block; margin-top: 8px;">Daftar
          Barang & Biaya</label>
        <div id="fakItemContainer">
        </div>

        <button onclick="tambahBarisFaktur()" class="action-btn"
          style="width: 100%; justify-content: center; border: 1px dashed var(--stabilo-green); color: var(--stabilo-green); padding: 10px; margin-bottom: 16px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          Tambah Keterangan / Barang Tambahan
        </button>

        <div class="form-group">
          <label>Catatan Faktur (Opsional)</label>
          <input type="text" id="fakCatatan" placeholder="Terima kasih telah berbelanja!">
        </div>

        <div class="modal-actions">
          <button class="modal-btn cancel-btn" onclick="tutupModal('modalFaktur')">Batal</button>
          <button class="modal-btn submit-btn" onclick="simpanFaktur()">Simpan Faktur</button>
        </div>
      </div>
    </div>

    <div id="modalHapusFaktur" class="modal-overlay">
      <div class="modal-card">
        <h3>Hapus Faktur?</h3>
        <p style="text-align: center; margin-bottom: 16px; font-size: 0.9rem; color: var(--text-muted);">Yakin ingin
          menghapus faktur ini? Data ini akan otomatis mengurangi Total Penjualan Anda.</p>
        <div class="modal-actions">
          <button class="modal-btn cancel-btn" onclick="tutupModal('modalHapusFaktur')">Batal</button>
          <button class="modal-btn submit-btn" style="background-color: #ff3b30; color: white;"
            onclick="konfirmasiHapusFaktur()">Hapus</button>
        </div>
      </div>
    </div>

  </div>
  <script src="script.js"></script>
</body>

</html>
