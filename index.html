<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yuuki Cell Kasir</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="mobile-app">

    <header class="app-header">
      <div class="header-top">
        <h1>Yuuki Cell Kasir</h1>
        <button id="themeToggle" class="icon-btn" aria-label="Toggle Dark Mode">
          <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>

      <div class="datetime-card">
        <div id="dateDisplay" class="date-text">Memuat...</div>
        <div id="timeDisplay" class="time-text">--:--:--</div>
      </div>
    </header>

    <main class="app-content">
      <section class="summary-section">
        <div class="summary-box sale-box">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
            <p style="margin-bottom: 0;">Total Penjualan</p>
            <button id="btnToggleSaldo" class="icon-btn" style="padding: 4px; color: #a1a1aa;">
              <svg id="iconEye" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
          <h2 id="totalPenjualan">Rp 0</h2>
        </div>

        <div class="summary-grid">
          <div class="summary-box capital-box">
            <p>Modal</p>
            <h3 id="totalModal">Rp 0</h3>
          </div>
          <div class="summary-box profit-box">
            <p>Laba Bersih</p>
            <h3 id="totalLaba">Rp 0</h3>
          </div>
        </div>
      </section>

      <section class="menu-grid">
        <a href="riwayat.html" class="menu-btn primary-btn">
          <svg class="icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
          Data Transaksi
        </a>

        <button class="menu-btn outline-btn">
          <svg class="icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"
            stroke-linecap="round" stroke-linejoin="round">
            <path
              d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z">
            </path>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
            <line x1="12" y1="22.08" x2="12" y2="12"></line>
          </svg>
          Produk
        </button>

        <button class="menu-btn outline-btn">
          <svg class="icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="20" x2="12" y2="10"></line>
            <line x1="18" y1="20" x2="18" y2="4"></line>
            <line x1="6" y1="20" x2="6" y2="14"></line>
          </svg>
          Laporan
        </button>
      </section>
    </main>

  </div>
  <script src="script.js"></script>
</body>

</html>
